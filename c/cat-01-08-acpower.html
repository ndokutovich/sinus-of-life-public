<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мощность во времени: p = u·i</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#15171f;--paper:#f6f5f0;--card:#fffefb;--muted:#6c7080;--line:#e4e2da;
--mono:ui-monospace,'JetBrains Mono',Consolas,monospace;--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);display:flex;justify-content:center;padding:10px}
.pen{width:100%;max-width:520px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px 12px;--acc:#d65f37}
.pen h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.pen .f{font-family:var(--mono);font-size:12.5px;margin:6px 0 8px;padding:7px 10px;border-radius:8px;overflow-x:auto;white-space:nowrap;background:color-mix(in srgb,#d65f37 12%,white);color:#9c3f1f}
.figbox{display:flex;justify-content:center;padding:2px 0 6px}
.figbox svg{width:100%;max-width:440px;height:auto}
.ctrl{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin:7px 0}
.ctrl label{flex:0 0 110px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:4px;cursor:pointer}
.ctrl .v{flex:0 0 48px;text-align:right;font-family:var(--mono);color:var(--ink);font-size:12px}
.rdt{margin-top:8px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.5;min-height:18px}
.rdt b{color:var(--ink);font-weight:600}
.cap{margin-top:6px;text-align:center;font-size:11px;color:var(--muted)}
.hd{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.hd .num{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:#9c3f1f}</style></head><body>
<div class="pen">
<div class="hd"><span class="num">ДВЕРЬ 01</span><h3>Мощность во времени: p = u·i</h3></div>
<div class="f">p(t) = u·i = UI·cos φ − UI·cos(2ωt−φ) · среднее = cos φ</div>
<div class="figbox"><svg id="fig" viewBox="0 0 440 240" preserveAspectRatio="xMidYMid meet"></svg></div>
<div class="ctrl"><label for="ph">сдвиг φ</label><input id="ph" type="range" min="0" max="90" step="1" value="55"><span class="v" id="phv">55°</span></div>
<div class="rdt" id="rdt"></div>
<div class="cap">сверху — напряжение и ток (сдвинуты на φ); снизу — их произведение p=u·i. Среднее (пунктир) = полезная мощность cos φ. Где p уходит вниз — энергия течёт обратно: это реактив</div>
</div>
<script>
const PI=Math.PI,$=id=>document.getElementById(id);
let PH=55;
$('ph').oninput=e=>{PH=+e.target.value;$('phv').textContent=PH+'°';};
const x0=30,x1=424,kx=0.013,W=2*PI*3/4.5;  // 3 периода за петлю захвата → бесшовно; ~3.5 цикла на экране

function frame(now){
  const t=now/1000, f=PH*PI/180, uy=54, AU=23, py=150, AP=40;
  const avg=Math.cos(f)/2;  // среднее p (в долях UI), p=sinA·sinB ∈ [-1,1]
  const P=x=>{const tau=t-(x-x0)*kx;return Math.sin(W*tau)*Math.sin(W*tau-f);};
  let s='';
  // оси
  s+='<line x1="'+x0+'" y1="'+uy+'" x2="'+x1+'" y2="'+uy+'" stroke="#dcdad2" stroke-width="1"/>';
  s+='<line x1="'+x0+'" y1="'+py+'" x2="'+x1+'" y2="'+py+'" stroke="#c7c5bc" stroke-width="1"/>';
  // заливка p: вверх (отдаём) коралл, вниз (назад) бирюза
  let fp='M'+x0+' '+py, fn='M'+x0+' '+py;
  for(let x=x0;x<=x1;x+=3){const p=P(x);fp+=' L'+x+' '+(py-AP*Math.max(0,p)).toFixed(1);fn+=' L'+x+' '+(py-AP*Math.min(0,p)).toFixed(1);}
  fp+=' L'+x1+' '+py+' Z'; fn+=' L'+x1+' '+py+' Z';
  s+='<path d="'+fp+'" fill="#d65f37" opacity="0.20"/>';
  s+='<path d="'+fn+'" fill="#138a64" opacity="0.22"/>';
  // кривая p
  let pc='';for(let x=x0;x<=x1;x+=2){pc+=x+','+(py-AP*P(x)).toFixed(1)+' ';}
  s+='<polyline points="'+pc.trim()+'" fill="none" stroke="#9c3f1f" stroke-width="2.4"/>';
  // среднее = полезная мощность
  const ya=(py-AP*2*avg).toFixed(1);
  s+='<line x1="'+x0+'" y1="'+ya+'" x2="'+x1+'" y2="'+ya+'" stroke="#0c5a41" stroke-width="1.6" stroke-dasharray="6 4"/>';
  s+='<text x="'+(x0+4)+'" y="'+(+ya-5)+'" font-family="ui-monospace,monospace" font-size="10.5" fill="#0c5a41">среднее = cos φ (полезная)</text>';
  // u и i сверху
  let uu='',ii='';
  for(let x=x0;x<=x1;x+=2){const tau=t-(x-x0)*kx;uu+=x+','+(uy-AU*Math.sin(W*tau)).toFixed(1)+' ';ii+=x+','+(uy-AU*Math.sin(W*tau-f)).toFixed(1)+' ';}
  s+='<polyline points="'+uu.trim()+'" fill="none" stroke="#3d6b9e" stroke-width="1.9"/>';
  s+='<polyline points="'+ii.trim()+'" fill="none" stroke="#c98a1b" stroke-width="1.9"/>';
  s+='<text x="'+x0+'" y="'+(uy-AU-7)+'" font-family="ui-monospace,monospace" font-size="10.5" fill="#3d6b9e">u — напряжение</text>';
  s+='<text x="'+(x0+128)+'" y="'+(uy-AU-7)+'" font-family="ui-monospace,monospace" font-size="10.5" fill="#c98a1b">i — ток</text>';
  s+='<text x="'+x0+'" y="'+(py+AP+18)+'" font-family="ui-monospace,monospace" font-size="10.5" fill="#9c3f1f">p = u·i</text>';
  s+='<text x="'+(x1)+'" y="'+(py+AP+18)+'" font-family="ui-monospace,monospace" font-size="10" fill="#0c5a41" text-anchor="end">бирюза вниз = энергия назад (реактив)</text>';
  $('fig').innerHTML=s;
  $('rdt').innerHTML='φ = <b>'+PH+'°</b> · полезная cos φ = <b>'+Math.cos(f).toFixed(2)+'</b> · при φ=90° среднее ноль — только качание туда-сюда';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
