<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Угол параллельности</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#f6f5f0;color:#15171f;display:flex;justify-content:center;padding:10px}
.pen{width:100%;max-width:480px;background:#fffefb;border:1px solid #e4e2da;border-radius:14px;padding:13px 15px 11px;--acc:#3d6b9e;--accd:#274a73}
.hd{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.hd .num{font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.08em;color:var(--accd)}
.hd h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.f{font-family:ui-monospace,monospace;font-size:12px;margin:2px 0 7px;padding:6px 10px;border-radius:8px;overflow-x:auto;white-space:nowrap;background:color-mix(in srgb,var(--acc) 11%,white);color:var(--accd)}
.figbox{display:flex;justify-content:center;padding:1px 0 4px;min-height:175px}
.figbox svg{width:100%;max-width:420px;height:auto;max-height:220px}
.ctrl{display:flex;align-items:center;gap:10px;font-size:12px;color:#6c7080;margin:6px 0}
.ctrl label{flex:0 0 122px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:4px;cursor:pointer}
.ctrl .v{flex:0 0 50px;text-align:right;font-family:ui-monospace,monospace;color:#15171f;font-size:11.5px}
.rdt{margin-top:6px;text-align:center;font-family:ui-monospace,monospace;font-size:11.5px;color:#6c7080;line-height:1.5;min-height:17px}
.rdt b{color:#15171f;font-weight:600}</style></head><body><div class="pen"><div class="hd"><span class="num">ДВЕРЬ 05</span><h3>Угол параллельности</h3></div><div class="f">sin Π(x) = 1/cosh(x)</div><div class="figbox" id="fig"></div><div id="ctrls"></div><div class="rdt" id="rdt"></div></div><script>
var PI=Math.PI, RM=false;
var C={co:'#d65f37',cod:'#9c3f1f',te:'#138a64',ted:'#0c5a41',vi:'#6a5bd6',vid:'#473aa3',go:'#c98a1b',god:'#8a5e12',sl:'#4a5568',sld:'#2f3947',ink:'#15171f',mut:'#8a8e9c'};
function n(x){return (Math.round(x*10)/10);}
function L(a,b,c,d,col,w,m){return '<line x1="'+n(a)+'" y1="'+n(b)+'" x2="'+n(c)+'" y2="'+n(d)+'" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round"'+(m?' marker-end="url(#ah)"':'')+'/>';}
function DL(a,b,c,d){return '<line x1="'+n(a)+'" y1="'+n(b)+'" x2="'+n(c)+'" y2="'+n(d)+'" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 4"/>';}
function AX(a,b,c,d){return '<line x1="'+a+'" y1="'+b+'" x2="'+c+'" y2="'+d+'" stroke="#c7c5bc" stroke-width="1"/>';}
function TX(x,y,s,col,sz,an){return '<text x="'+n(x)+'" y="'+n(y)+'" font-family="JetBrains Mono,ui-monospace,monospace" font-size="'+(sz||12)+'" fill="'+(col||C.mut)+'"'+(an?' text-anchor="'+an+'"':'')+'>'+s+'</text>';}
function D(x,y,r,f){return '<circle cx="'+n(x)+'" cy="'+n(y)+'" r="'+r+'" fill="'+f+'"/>';}
function CC(x,y,r,col,w){return '<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+w+'"/>';}
function W(fn,x0,x1,yb,amp,col,w,op,dash){var N=150,p='';for(var i=0;i<=N;i++){var u=i/N;p+=n(x0+(x1-x0)*i/N)+','+n(yb-amp*fn(u))+' ';}return '<polyline points="'+p.trim()+'" fill="none" stroke="'+col+'" stroke-width="'+w+'"'+(op?' opacity="'+op+'"':'')+(dash?' stroke-dasharray="5 4"':'')+'/>';}
function part(u,m){var s=0;for(var k=1;k<=2*m-1;k+=2){s+=Math.sin(k*2*PI*1.5*u)/k;}return s*4/PI;}
function sq(u){return Math.sin(u*2*PI*1.5)>=0?1:-1;}

var VOWA=null;
const DEFS='<defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
var F={hypsin:{vb:'0 0 360 205',anim:false,ctrls:[{k:'x',lab:'расстояние x',min:0.1,max:3,step:0.05,val:1}],
 R:function(p){var by=158,bx0=50,bx1=330,px=120,ang=Math.asin(1/Math.cosh(p.x)),top=34,
  ex=px+(by-top)*Math.tan(PI/2-ang);
  return L(bx0,by,bx1,by,C.sld,2.2)+DL(px,by,px,top)
  +L(px,by,Math.min(bx1,ex),Math.max(top,by-(Math.min(bx1,ex)-px)/Math.tan(PI/2-ang)),C.sl,2.4,1)
  +D(px,by,4,C.sld)
  +'<path d="M'+n(px)+' '+n(by-34)+' A34 34 0 0 1 '+n(px+34*Math.sin(ang))+' '+n(by-34*Math.cos(ang))+'" fill="none" stroke="'+C.mut+'" stroke-width="1.2"/>'
  +TX(px+10,by-40,'\u03a0(x)',C.sld,12)+TX((bx0+px)/2,by+18,'\u043f\u0440\u044f\u043c\u0430\u044f',C.mut,11)
  +TX(230,190,'\u043f\u0440\u0435\u0434\u0435\u043b\u044c\u043d\u0430\u044f \u043f\u0430\u0440\u0430\u043b\u043b\u0435\u043b\u044c',C.mut,11);},
 rd:function(p){var a=Math.asin(1/Math.cosh(p.x))*180/PI;return 'sin \u03a0(x) = 1/cosh(x) \u2192 \u03a0 = <b>'+a.toFixed(0)+'\u00b0</b>. \u0423 \u0415\u0432\u043a\u043b\u0438\u0434\u0430 \u0432\u0441\u0435\u0433\u0434\u0430 90\u00b0; \u0437\u0434\u0435\u0441\u044c \u0443\u0433\u043e\u043b \u0442\u0430\u0435\u0442 \u0441 \u0440\u0430\u0441\u0441\u0442\u043e\u044f\u043d\u0438\u0435\u043c';}}};
var d=F['hypsin'],P={},T=RM?0.7:0;
var figEl=document.getElementById('fig'),ctrlEl=document.getElementById('ctrls'),rdEl=document.getElementById('rdt');
function fmt(c,v){var s=(c.step&&c.step<1)?(+v).toFixed(c.step<0.1?2:1):(''+v);return s+(c.unit||'')}
function draw(){figEl.innerHTML='<svg viewBox="'+d.vb+'" preserveAspectRatio="xMidYMid meet">'+DEFS+d.R(P,T)+'</svg>';if(rdEl)rdEl.innerHTML=d.rd?d.rd(P,T):''}
var hh='';(d.ctrls||[]).forEach(function(x,k){P[x.k]=x.val;hh+='<div class="ctrl"><label>'+x.lab+'</label><input type="range" data-k="'+x.k+'" data-i="'+k+'" min="'+x.min+'" max="'+x.max+'" step="'+(x.step||1)+'" value="'+x.val+'"><span class="v">'+fmt(x,x.val)+'</span></div>'});
ctrlEl.innerHTML=hh;
[].forEach.call(ctrlEl.querySelectorAll('input'),function(inp){inp.addEventListener('input',function(){var c2=d.ctrls[+inp.dataset.i];P[inp.dataset.k]=+inp.value;inp.nextElementSibling.textContent=fmt(c2,+inp.value);draw()})});
draw();
if(!RM&&d.anim){var t0=performance.now();(function loop(now){T=(now-t0)/1000;draw();requestAnimationFrame(loop)})(t0)}
</script></body></html>
