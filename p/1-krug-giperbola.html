<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Круг и гипербола: один минус разницы</title>
<style>/* Общий стиль пенов «Карты синуса» — компакт под embed ~430px */
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#15171f;--paper:#f6f5f0;--card:#fffefb;--muted:#6c7080;--line:#e4e2da;
--coral:#d65f37;--coral-d:#9c3f1f;--teal:#138a64;--teal-d:#0c5a41;
--violet:#6a5bd6;--violet-d:#473aa3;--gold:#c98a1b;--gold-d:#8a5e12;
--mono:ui-monospace,'JetBrains Mono',Consolas,monospace;
--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);
display:flex;justify-content:center;padding:10px}
.pen{width:100%;max-width:520px;background:var(--card);border:1px solid var(--line);
border-radius:14px;padding:14px 16px 12px}
.pen h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.pen .f{font-family:var(--mono);font-size:12.5px;margin:6px 0 8px;padding:7px 10px;
border-radius:8px;overflow-x:auto;white-space:nowrap}
.figbox{display:flex;justify-content:center;padding:2px 0 6px}
.figbox svg{width:100%;max-width:440px;height:auto}
.ctrl{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin:7px 0}
.ctrl label{flex:0 0 118px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:4px;cursor:pointer}
.ctrl .v{flex:0 0 52px;text-align:right;font-family:var(--mono);color:var(--ink);font-size:12px}
.rdt{margin-top:8px;text-align:center;font-family:var(--mono);font-size:12px;
color:var(--muted);line-height:1.5;min-height:18px}
.rdt b{color:var(--ink);font-weight:600}
.cap{margin-top:6px;text-align:center;font-size:11px;color:var(--muted)}

.pen{--acc:#3d6b9e} .pen .f{background:color-mix(in srgb,#3d6b9e 12%,white);color:#274a73}
</style></head><body>
<div class="pen"><h3>Круг и гипербола: один минус разницы</h3><div class="f">cos²+sin²=1  ·  cosh²−sinh²=1</div>
<div class="figbox"><svg id="fig" viewBox="0 0 440 250" preserveAspectRatio="xMidYMid meet"></svg></div>
<div class="ctrl"><label for="p">параметр</label><input id="p" type="range" min="0" max="1.4" step="0.02" value="0.6"><span class="v" id="pv">0.60</span></div><div class="rdt" id="rdt">sin(ix) = i·sinh(x) — синус мнимого угла</div><div class="cap">тот же угол на круге даёт sin/cos, на гиперболе — sinh/cosh</div></div>
<script>
const PI=Math.PI, $=id=>document.getElementById(id);
const RM=false;
function n(x){return Math.round(x*10)/10}
function L(a,b,c,d,col,w,m){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round" ${m?'marker-end="url(#ah)"':''}/>`}
function DL(a,b,c,d){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 4"/>`}
function AX(a,b,c,d){return `<line x1="${a}" y1="${b}" x2="${c}" y2="${d}" stroke="#c7c5bc" stroke-width="1"/>`}
function TX(x,y,s,col='#6c7080',sz=12,an=''){return `<text x="${n(x)}" y="${n(y)}" font-family="ui-monospace,monospace" font-size="${sz}" fill="${col}" ${an?`text-anchor="${an}"`:''}>${s}</text>`}
function D(x,y,r,f){return `<circle cx="${n(x)}" cy="${n(y)}" r="${r}" fill="${f}"/>`}
function CC(x,y,r,col,w){return `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${col}" stroke-width="${w}"/>`}
const DEFS=`<defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

let P=0.6;
$('p').oninput=e=>{P=+e.target.value;$('pv').textContent=P.toFixed(2);draw()};
function draw(){
  // левый круг
  const Lc=[115,120], r=78, a=P*1.1;
  let s=DEFS;
  s+=AX(25,120,205,120)+AX(115,210,115,30)+CC(Lc[0],Lc[1],r,'#cfd9d3',1.2);
  const px=Lc[0]+r*Math.cos(a), py=Lc[1]-r*Math.sin(a);
  s+=L(Lc[0],Lc[1],px,Lc[1],'#0c5a41',2)+L(px,Lc[1],px,py,'#138a64',2);
  s+=L(Lc[0],Lc[1],px,py,'#138a64',2.6,1)+D(px,py,4,'#138a64');
  s+=TX(Lc[0]+8,138,'cos','#0c5a41',11)+TX(px+5,(py+Lc[1])/2,'sin','#138a64',11);
  s+=TX(115,228,'окружность','#6c7080',11,'middle');
  // правая гипербола
  const Rc=[265,120], sc=46;
  let d='M';
  for(let v=-1.5;v<=1.5;v+=0.05){ d+=` ${n(Rc[0]+sc*Math.cosh(v))},${n(Rc[1]-sc*Math.sinh(v))}`; }
  s+=AX(225,120,425,120)+AX(265,210,265,30);
  s+=`<line x1="245" y1="195" x2="420" y2="45" stroke="#d6cbb8" stroke-width="1" stroke-dasharray="4 4"/>`;
  s+=`<line x1="245" y1="45" x2="420" y2="195" stroke="#d6cbb8" stroke-width="1" stroke-dasharray="4 4"/>`;
  s+=`<path d="${d}" fill="none" stroke="#9fb2c8" stroke-width="1.3"/>`;
  const hx=Rc[0]+sc*Math.cosh(a), hy=Rc[1]-sc*Math.sinh(a);
  s+=L(Rc[0],Rc[1],hx,Rc[1],'#9c3f1f',2)+L(hx,Rc[1],hx,hy,'#d65f37',2);
  s+=L(Rc[0],Rc[1],hx,hy,'#d65f37',2.6,1)+D(hx,hy,4,'#d65f37');
  s+=TX(Rc[0]-2,138,'cosh','#9c3f1f',11)+TX(hx+5,(hy+Rc[1])/2,'sinh','#d65f37',11);
  s+=TX(265,228,'гипербола','#6c7080',11,'middle');
  $('fig').innerHTML=s;
}
draw();

</script></body></html>
