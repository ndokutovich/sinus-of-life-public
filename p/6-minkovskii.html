<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Диаграмма Минковского: буст — это поворот</title>
<style>/* Общий стиль пенов «Карты синуса» — компакт под embed ~430px */
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#15171f;--paper:#f6f5f0;--card:#fffefb;--muted:#6c7080;--line:#e4e2da;
--coral:#d65f37;--coral-d:#9c3f1f;--teal:#138a64;--teal-d:#0c5a41;
--violet:#6a5bd6;--violet-d:#473aa3;--gold:#c98a1b;--gold-d:#8a5e12;
--mono:ui-monospace,'JetBrains Mono',Consolas,monospace;
--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);
display:flex;justify-content:center;padding:10px}
.pen{width:100%;max-width:520px;background:var(--card);border:1px solid var(--line);
border-radius:14px;padding:14px 16px 12px}
.pen h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.pen .f{font-family:var(--mono);font-size:12.5px;margin:6px 0 8px;padding:7px 10px;
border-radius:8px;overflow-x:auto;white-space:nowrap}
.figbox{display:flex;justify-content:center;padding:2px 0 6px}
.figbox svg{width:100%;max-width:440px;height:auto}
.ctrl{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin:7px 0}
.ctrl label{flex:0 0 118px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:4px;cursor:pointer}
.ctrl .v{flex:0 0 52px;text-align:right;font-family:var(--mono);color:var(--ink);font-size:12px}
.rdt{margin-top:8px;text-align:center;font-family:var(--mono);font-size:12px;
color:var(--muted);line-height:1.5;min-height:18px}
.rdt b{color:var(--ink);font-weight:600}
.cap{margin-top:6px;text-align:center;font-size:11px;color:var(--muted)}

.pen{--acc:#d65f37} .pen .f{background:color-mix(in srgb,#d65f37 12%,white);color:#9c3f1f}</style></head><body>
<div class="pen"><h3>Диаграмма Минковского: буст — это поворот</h3><div class="f">буст сдвигает метку по гиперболе t²−x²=1 — поворот на быстроту́ u</div>
<div class="figbox"><svg id="fig" viewBox="0 0 440 300" preserveAspectRatio="xMidYMid meet"></svg></div>
<div class="ctrl"><label for="b">скорость v</label><input id="b" type="range" min="-0.85" max="0.85" step="0.05" value="0.5"><span class="v" id="bv">0.50c</span></div><div class="rdt" id="rdt"></div><div class="cap">разгон сжимает оси к лучу света; обогнать его = сомкнуть ножницы, что невозможно</div></div>
<script>
const PI=Math.PI, $=id=>document.getElementById(id);
const RM=false;
function n(x){return Math.round(x*100)/100}
function L(a,b,c,d,col,w,m){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round" ${m?'marker-end="url(#ah)"':''}/>`}
function DL(a,b,c,d,col){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="${col||'#b4b2a9'}" stroke-width="1" stroke-dasharray="4 4"/>`}
function AX(a,b,c,d){return `<line x1="${a}" y1="${b}" x2="${c}" y2="${d}" stroke="#c7c5bc" stroke-width="1"/>`}
function TX(x,y,s,col='#6c7080',sz=12,an=''){return `<text x="${n(x)}" y="${n(y)}" font-family="ui-monospace,monospace" font-size="${sz}" fill="${col}" ${an?`text-anchor="${an}"`:''}>${s}</text>`}
function D(x,y,r,f){return `<circle cx="${n(x)}" cy="${n(y)}" r="${r}" fill="${f}"/>`}
function CC(x,y,r,col,w){return `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${col}" stroke-width="${w}"/>`}
const DEFS=`<defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

let beta=0.5;
$('b').oninput=e=>{beta=+e.target.value;$('bv').textContent=beta.toFixed(2)+'c';draw()};
const O={x:200,y:158}, S=72;    // центр и масштаб
function P(t,x){ return {X:O.x + x*S, Y:O.y - t*S}; }  // t вверх, x вправо
function hypPL(fn){ let p=''; for(let u=-1.35;u<=1.3501;u+=0.09){const A=fn(u); p+=`${n(A.X)},${n(A.Y)} `;} return p.trim(); }
function draw(){
  const g=1/Math.sqrt(1-beta*beta), U=Math.atanh(beta);  // γ и быстрота́
  const AXn=1.85, LC=1.95;
  let s=DEFS;
  // световой конус (диагонали t=±x)
  s+=`<line x1="${P(-LC,-LC).X}" y1="${P(-LC,-LC).Y}" x2="${P(LC,LC).X}" y2="${P(LC,LC).Y}" stroke="#e0a93b" stroke-width="2"/>`;
  s+=`<line x1="${P(-LC,LC).X}" y1="${P(-LC,LC).Y}" x2="${P(LC,-LC).X}" y2="${P(LC,-LC).Y}" stroke="#e0a93b" stroke-width="2"/>`;
  s+=TX(P(LC,LC-0.12).X-2,P(LC,LC-0.12).Y-2,'свет','#b07d1a',11,'end');
  // ИНВАРИАНТНЫЕ ГИПЕРБОЛЫ: t²−x²=1 (времениподобная, вверх) и x²−t²=1 (пространственноподобная, вправо)
  s+=`<polyline points="${hypPL(u=>P(Math.cosh(u),Math.sinh(u)))}" fill="none" stroke="#cbb892" stroke-width="1.3" stroke-dasharray="2 3"/>`;
  s+=`<polyline points="${hypPL(u=>P(Math.sinh(u),Math.cosh(u)))}" fill="none" stroke="#cbb892" stroke-width="1.3" stroke-dasharray="2 3"/>`;
  // неподвижные оси (наблюдатель A) — серые
  s+=L(P(-AXn,0).X,P(-AXn,0).Y,P(AXn,0).X,P(AXn,0).Y,'#bfc0b8',1.6,1);   // t (вертикаль)
  s+=L(P(0,-AXn).X,P(0,-AXn).Y,P(0,AXn).X,P(0,AXn).Y,'#bfc0b8',1.6,1);   // x (горизонталь)
  s+=TX(P(AXn,0).X+5,P(AXn,0).Y+4,'t','#9a9b92',12)+TX(P(0,AXn).X+4,P(0,AXn).Y+2,'x','#9a9b92',12);
  // движущиеся оси (наблюдатель B): t'-ось x=βt, x'-ось t=βx — обе жмутся к свету
  const tp1=P(AXn, beta*AXn), tp2=P(-AXn,-beta*AXn);
  const xp1=P(beta*AXn, AXn), xp2=P(-beta*AXn,-AXn);
  s+=L(tp2.X,tp2.Y,tp1.X,tp1.Y,'#d65f37',2.4,1);
  s+=L(xp2.X,xp2.Y,xp1.X,xp1.Y,'#d65f37',2.4,1);
  s+=TX(tp1.X+4,tp1.Y,"t'","#9c3f1f",12)+TX(xp1.X+4,xp1.Y+4,"x'","#9c3f1f",12);
  // ЕДИНИЧНАЯ МЕТКА скользит ПО ГИПЕРБОЛЕ: A в (1,0)/(0,1), B в (γ,γβ)/(γβ,γ) — на той же гиперболе
  // жирный сегмент гиперболы от метки A до метки B = сам буст (гиперболический поворот на u)
  let slT='', slX=''; const st=U>=0?0.03:-0.03;
  for(let u=0; U>=0? u<=U+1e-9: u>=U-1e-9; u+=st){
    const a=P(Math.cosh(u),Math.sinh(u)); slT+=`${n(a.X)},${n(a.Y)} `;
    const b=P(Math.sinh(u),Math.cosh(u)); slX+=`${n(b.X)},${n(b.Y)} `;
  }
  s+=`<polyline points="${slT.trim()}" fill="none" stroke="#d65f37" stroke-width="2.6"/>`;
  s+=`<polyline points="${slX.trim()}" fill="none" stroke="#d65f37" stroke-width="2.6"/>`;
  const At=P(1,0), Ax=P(0,1), Bt=P(g,g*beta), Bx=P(g*beta,g);
  s+=D(At.X,At.Y,3,'#9a9b92')+D(Ax.X,Ax.Y,3,'#9a9b92');
  s+=D(Bt.X,Bt.Y,4.2,'#d65f37')+D(Bx.X,Bx.Y,4.2,'#d65f37');
  s+=TX(At.X-6,At.Y+4,'1','#9a9b92',10,'end')+TX(Bt.X+6,Bt.Y+3,"1'","#9c3f1f",10);
  $('fig').innerHTML=s;
  const ang=Math.atan(Math.abs(beta))*180/PI;
  $('rdt').innerHTML=`v=${beta.toFixed(2)}c: оси сомкнулись к свету на ${ang.toFixed(0)}°. Метка «1» уехала в «1'» <b>по гиперболе</b> — буст это поворот на быстроту́ u=${U.toFixed(2)}`;
}
draw();

</script></body></html>
