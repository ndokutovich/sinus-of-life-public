<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Угол параллельности (Лобачевский)</title>
<style>/* Общий стиль пенов «Карты синуса» — компакт под embed ~430px */
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#15171f;--paper:#f6f5f0;--card:#fffefb;--muted:#6c7080;--line:#e4e2da;
--coral:#d65f37;--coral-d:#9c3f1f;--teal:#138a64;--teal-d:#0c5a41;
--violet:#6a5bd6;--violet-d:#473aa3;--gold:#c98a1b;--gold-d:#8a5e12;
--mono:ui-monospace,'JetBrains Mono',Consolas,monospace;
--sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);
display:flex;justify-content:center;padding:10px}
.pen{width:100%;max-width:520px;background:var(--card);border:1px solid var(--line);
border-radius:14px;padding:14px 16px 12px}
.pen h3{font-size:15px;font-weight:600;letter-spacing:-.01em}
.pen .f{font-family:var(--mono);font-size:12.5px;margin:6px 0 8px;padding:7px 10px;
border-radius:8px;overflow-x:auto;white-space:nowrap}
.figbox{display:flex;justify-content:center;padding:2px 0 6px}
.figbox svg{width:100%;max-width:440px;height:auto}
.ctrl{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin:7px 0}
.ctrl label{flex:0 0 118px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:4px;cursor:pointer}
.ctrl .v{flex:0 0 52px;text-align:right;font-family:var(--mono);color:var(--ink);font-size:12px}
.rdt{margin-top:8px;text-align:center;font-family:var(--mono);font-size:12px;
color:var(--muted);line-height:1.5;min-height:18px}
.rdt b{color:var(--ink);font-weight:600}
.cap{margin-top:6px;text-align:center;font-size:11px;color:var(--muted)}

.pen{--acc:#3d6b9e} .pen .f{background:color-mix(in srgb,#3d6b9e 12%,white);color:#274a73}
</style></head><body>
<div class="pen"><h3>Угол параллельности (Лобачевский)</h3><div class="f">sin Π(x) = 1 / cosh(x)</div>
<div class="figbox"><svg id="fig" viewBox="0 0 440 240" preserveAspectRatio="xMidYMid meet"></svg></div>
<div class="ctrl"><label for="x">расстояние x</label><input id="x" type="range" min="0.1" max="3" step="0.05" value="1"><span class="v" id="xv">1.00</span></div><div class="rdt" id="rdt"></div><div class="cap">у Евклида этот угол всегда 90°; здесь он тает с расстоянием</div></div>
<script>
const PI=Math.PI, $=id=>document.getElementById(id);
const RM=false;
function n(x){return Math.round(x*10)/10}
function L(a,b,c,d,col,w,m){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="${col}" stroke-width="${w}" stroke-linecap="round" ${m?'marker-end="url(#ah)"':''}/>`}
function DL(a,b,c,d){return `<line x1="${n(a)}" y1="${n(b)}" x2="${n(c)}" y2="${n(d)}" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 4"/>`}
function AX(a,b,c,d){return `<line x1="${a}" y1="${b}" x2="${c}" y2="${d}" stroke="#c7c5bc" stroke-width="1"/>`}
function TX(x,y,s,col='#6c7080',sz=12,an=''){return `<text x="${n(x)}" y="${n(y)}" font-family="ui-monospace,monospace" font-size="${sz}" fill="${col}" ${an?`text-anchor="${an}"`:''}>${s}</text>`}
function D(x,y,r,f){return `<circle cx="${n(x)}" cy="${n(y)}" r="${r}" fill="${f}"/>`}
function CC(x,y,r,col,w){return `<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${col}" stroke-width="${w}"/>`}
const DEFS=`<defs><marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

let X=1;
$('x').oninput=e=>{X=+e.target.value;$('xv').textContent=X.toFixed(2);draw()};
// СЦЕНА — диск Пуанкаре (честная модель): «данная прямая» = диаметр, вы = точка P над ним
// на гиперболическом расстоянии x (евклидово tanh(x/2)), предельная параллель = дуга,
// ортогональная краю, встречающая диаметр РОВНО на крае диска — то есть на бесконечности.
const CXd=136, CYd=126, Rd=92;
function toS(v){return {X:CXd+v.x*Rd, Y:CYd-v.y*Rd};}
// окружность через a,b, ортогональная единичной (как в пене диска; работает и для точек на границе)
function geoC(a,b){
  const a2=a.x*a.x+a.y*a.y, b2=b.x*b.x+b.y*b.y;
  const det=2*(a.x*b.y-a.y*b.x);
  if(Math.abs(det)<1e-9) return null;
  const cx=((1+a2)*b.y-(1+b2)*a.y)/det, cy=((1+b2)*a.x-(1+a2)*b.x)/det;
  return {x:cx,y:cy,r:Math.sqrt(Math.max(1e-12,cx*cx+cy*cy-1))};
}
function arcSVG(a,b,c){ // дуга c от a до b (модельные координаты)
  const A=toS(a),B=toS(b);
  if(!c) return `M${n(A.X)} ${n(A.Y)} L${n(B.X)} ${n(B.Y)}`;
  const Cs={X:CXd+c.x*Rd, Y:CYd-c.y*Rd};
  const cross=(A.X-Cs.X)*(B.Y-Cs.Y)-(A.Y-Cs.Y)*(B.X-Cs.X);
  return `M${n(A.X)} ${n(A.Y)} A${n(c.r*Rd)} ${n(c.r*Rd)} 0 0 ${cross>0?0:1} ${n(B.X)} ${n(B.Y)}`;
}
function draw(){
  const ang=Math.asin(1/Math.cosh(X));   // Π(x)
  const t=Math.tanh(X/2);                // евклидов радиус точки P в модели
  const P={x:0,y:t}, O={x:0,y:0}, E={x:1,y:0}, W={x:-1,y:0};
  let s=DEFS;
  // диск и «данная прямая» (диаметр)
  s+=`<circle cx="${CXd}" cy="${CYd}" r="${Rd}" fill="#fbfbf9" stroke="#9fb2c8" stroke-width="1.4"/>`;
  s+=L(CXd-Rd,CYd,CXd+Rd,CYd,'#274a73',2.2);
  s+=TX(CXd-Rd+6,CYd+14,'данная прямая','#6c7080',10);
  // перпендикуляр P->O (вертикальный диаметр — тоже геодезическая), длина x
  const Ps=toS(P);
  s+=DL(Ps.X,Ps.Y,CXd,CYd)+TX(Ps.X-7,(Ps.Y+CYd)/2+4,'x','#6c7080',11,'end');
  s+=D(CXd,CYd,3,'#274a73');
  // веер серых лучей из P, которые прямую ПЕРЕСЕКАЮТ (уходят к нижней границе)
  for(const th of [-0.35,-0.75,-1.2]){
    const B={x:Math.cos(th),y:Math.sin(th)};
    s+=`<path d="${arcSVG(P,B,geoC(P,B))}" fill="none" stroke="#c9c7be" stroke-width="1.1"/>`;
  }
  // предельные параллели: к ∞ справа (жирная) и слева (бледная, симметрия)
  const cR=geoC(P,E), cL=geoC(P,W);
  s+=`<path d="${arcSVG(P,W,cL)}" fill="none" stroke="#9fb2c8" stroke-width="1.4"/>`;
  s+=`<path d="${arcSVG(P,E,cR)}" fill="none" stroke="#3d6b9e" stroke-width="2.6"/>`;
  // точка встречи = край диска = бесконечность
  const Es=toS(E);
  s+=D(Es.X,Es.Y,3.6,'#c98a1b')+TX(Es.X+4,Es.Y-8,'∞','#8a5e12',13);
  // угол Π(x) в точке P: между перпендикуляром ВНИЗ и касательной предельной дуги
  // касательная численно: маленький шаг по дуге cR от P к E
  const phP=Math.atan2(P.y-cR.y,P.x-cR.x), phE=Math.atan2(E.y-cR.y,E.x-cR.x);
  let dph=(phE-phP); while(dph>PI)dph-=2*PI; while(dph<-PI)dph+=2*PI;
  const P2={x:cR.x+cR.r*Math.cos(phP+dph*0.02), y:cR.y+cR.r*Math.sin(phP+dph*0.02)};
  const P2s=toS(P2);
  let tx=P2s.X-Ps.X, ty=P2s.Y-Ps.Y; const tl=Math.hypot(tx,ty); tx/=tl; ty/=tl;
  const AR=24;
  s+=`<path d="M${n(Ps.X)} ${n(Ps.Y+AR)} A${AR} ${AR} 0 0 0 ${n(Ps.X+AR*tx)} ${n(Ps.Y+AR*ty)}" fill="none" stroke="#6c7080" stroke-width="1.2"/>`;
  s+=TX(Ps.X+10,Ps.Y+AR+2,'Π(x)','#274a73',11.5);
  s+=D(Ps.X,Ps.Y,4.2,'#3d6b9e')+TX(Ps.X-8,Ps.Y-8,'вы','#274a73',11,'end');
  // === правая панель: Π(x) от расстояния, маркер на текущем x ===
  const gx=290,gy1=200,gy0=44,gw=126;
  s+=AX(gx,gy1,gx+gw,gy1)+AX(gx,gy1,gx,gy0);
  s+=DL(gx,gy0,gx+gw,gy0)+TX(gx+gw-2,gy0-5,'90° (Евклид)','#9fa3b2',9.5,'end');
  let pl='';
  for(let i=0;i<=80;i++){const xx=0.02+3*i/80;
    pl+=`${n(gx+gw*xx/3)},${n(gy1-(gy1-gy0)*(Math.asin(1/Math.cosh(xx))/(PI/2)))} `;}
  s+=`<polyline points="${pl.trim()}" fill="none" stroke="#274a73" stroke-width="2.2"/>`;
  const Xg=gx+gw*X/3;
  s+=DL(Xg,gy0,Xg,gy1)+D(Xg,gy1-(gy1-gy0)*(ang/(PI/2)),3.6,'#c98a1b');
  s+=TX(gx,gy0-16,'угол Π от расстояния','#6c7080',10.5);
  s+=TX(gx+gw/2,gy1+15,'расстояние x →','#6c7080',10,'middle');
  $('fig').innerHTML=s;
  const a=ang*180/PI;
  $('rdt').innerHTML=`x = ${X.toFixed(2)} → Π(x) = <b>${a.toFixed(0)}°</b>: серые лучи пересекают прямую, синий — предельный, встречает её только на бесконечности (край диска)`;
}
draw();

</script></body></html>
